<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="color-scheme" content="light dark"/>
  <title>YAP! Rank</title>

  <!-- ✅ Telegram Mini App SDK — MUST be first script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@500;700;900&display=swap" rel="stylesheet"/>

  <style>
    /* ── CSS Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    img, svg { display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Telegram Theme Variables ───────────────────────────── */
    :root {
      --tg-bg:          var(--tg-theme-bg-color, #F0F4FF);
      --tg-text:        var(--tg-theme-text-color, #1A1F36);
      --tg-hint:        var(--tg-theme-hint-color, #8492B4);
      --tg-link:        var(--tg-theme-link-color, #3ECF8E);
      --tg-btn:         var(--tg-theme-button-color, #3ECF8E);
      --tg-btn-text:    var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary:   var(--tg-theme-secondary-bg-color, #EEF2FF);

      /* App colors */
      --green:    #3ECF8E;
      --green2:   #27A86F;
      --blue:     #5B8AF6;
      --red:      #F96060;
      --purple:   #9B6BF9;
      --orange:   #FFB43A;
      --gold:     #F9B43A;
      --white:    #FFFFFF;
      --shadow:   0 4px 24px rgba(60,80,180,.12);
      --shadow-sm:0 2px 12px rgba(60,80,180,.07);
    }

    html, body {
      height: 100%;
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── App Shell ──────────────────────────────────────────── */
    #app {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Pages ──────────────────────────────────────────────── */
    .page {
      display: none;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .page.active { display: block; }
    .page-content { padding-bottom: env(safe-area-inset-bottom, 0); }

    /* ── Bottom Nav ─────────────────────────────────────────── */
    .bottom-nav {
      display: flex;
      background: var(--white);
      border-top: 1px solid rgba(0,0,0,.06);
      padding-bottom: env(safe-area-inset-bottom, 0);
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: .6rem .25rem .5rem;
      gap: .2rem;
      font-size: .58rem; font-weight: 700; color: var(--tg-hint);
      text-transform: uppercase; letter-spacing: .08em;
      transition: color .2s;
      position: relative;
      -webkit-appearance: none;
    }
    .nav-tab.active { color: var(--green); }
    .nav-tab.active::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%; height: 2px;
      background: var(--green); border-radius: 0 0 3px 3px;
    }
    .nav-tab svg { width: 22px; height: 22px; transition: transform .2s; }
    .nav-tab.active svg { transform: scale(1.1); }

    /* ── Header Strip ───────────────────────────────────────── */
    .header-strip {
      background: linear-gradient(135deg, var(--green), #29C27C);
      padding: 1.1rem 1.25rem 2.8rem;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .header-strip::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,.12);
    }
    .header-strip::after {
      content: '';
      position: absolute; bottom: -20px; left: 40%;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,255,255,.07);
    }
    .header-label { font-size: .65rem; font-weight: 700; color: rgba(255,255,255,.75); letter-spacing: .2em; text-transform: uppercase; }
    .header-name  { font-size: 1.4rem; font-weight: 900; color: #fff; margin-top: .1rem; }

    /* Leaderboard header compact */
    .header-compact {
      background: linear-gradient(135deg, var(--green), #29C27C);
      padding: 1rem 1.25rem 1rem;
      display: flex; align-items: center; gap: .85rem;
      position: relative; flex-shrink: 0; overflow: hidden;
    }
    .header-compact::before {
      content: ''; position: absolute; top: -20px; right: -20px;
      width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,.1);
    }
    .hc-avatar { position: relative; flex-shrink: 0; }
    .hc-info { flex: 1; }
    .hc-name  { font-size: .95rem; font-weight: 800; color: #fff; }
    .hc-rank  { font-size: .75rem; color: rgba(255,255,255,.8); margin-top: .05rem; font-weight: 600; }
    .hc-stars { margin-top: .2rem; }
    .hc-actions { display: flex; gap: .4rem; }
    .hc-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: rgba(255,255,255,.2); border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .hc-btn:active { background: rgba(255,255,255,.35); }
    .hc-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }

    /* ── Profile card ───────────────────────────────────────── */
    .profile-card {
      background: var(--white); border-radius: 1.25rem;
      margin: 0 1rem; margin-top: -2.4rem;
      box-shadow: var(--shadow); padding: 1.1rem;
      position: relative; z-index: 10;
    }
    .profile-top { display: flex; align-items: center; gap: .9rem; }

    /* Rank badge SVG */
    .rank-badge-wrap { position: relative; flex-shrink: 0; }
    .rank-badge-wrap svg.badge-svg { width: 56px; height: 56px; }
    .rank-badge-crown {
      position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 18px;
    }

    .pf-info { flex: 1; min-width: 0; }
    .pf-name  { font-size: 1rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pf-rank  { font-size: .75rem; color: var(--tg-hint); font-weight: 600; margin-top: .15rem; }
    .pf-stars { display: flex; gap: 2px; margin-top: .25rem; }
    .pf-stars svg { width: 13px; height: 13px; }

    .pf-xp-pill {
      background: var(--green); color: #fff;
      border-radius: 99px; padding: .3rem .8rem;
      font-weight: 900; font-size: .85rem;
      display: flex; align-items: center; gap: .35rem;
      box-shadow: 0 4px 14px rgba(62,207,142,.4);
      flex-shrink: 0;
    }
    .pf-xp-pill svg { width: 14px; height: 14px; fill: #fff; }

    /* Streak/rank pills row */
    .pf-pills { display: flex; gap: .5rem; align-items: center; margin-top: .85rem; flex-wrap: wrap; }
    .pill {
      display: flex; align-items: center; gap: .3rem;
      border-radius: 99px; padding: .28rem .7rem;
      font-size: .75rem; font-weight: 700;
    }
    .pill svg { width: 14px; height: 14px; }
    .pill-fire  { background: #fff7e6; border: 1.5px solid #ffe3a0; color: #c87000; }
    .pill-rank  { background: #eef2ff; border: 1.5px solid #c7d2fe; color: var(--blue); }
    .pill-fire svg { fill: #f97316; }
    .pill-rank svg { fill: var(--blue); }

    /* XP Bar */
    .xp-bar-wrap { flex: 1; }
    .xp-bar-label { display: flex; justify-content: space-between; font-size: .65rem; font-weight: 700; color: var(--tg-hint); margin-bottom: .3rem; }
    .xp-track { height: 7px; background: #eef2ff; border-radius: 99px; overflow: hidden; }
    .xp-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--green), #27E8A0);
      box-shadow: 0 0 8px rgba(62,207,142,.5);
      transition: width 1.6s cubic-bezier(.22,1,.36,1);
      position: relative; overflow: hidden;
    }
    .xp-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.4) 50%, transparent 100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0%{left:-100%} 100%{left:200%} }

    /* ── Stat cards ─────────────────────────────────────────── */
    .section-title { font-size: .85rem; font-weight: 800; padding: 1rem 1rem .5rem; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; padding: 0 1rem; }
    .stat-card {
      border-radius: 1.15rem; padding: 1rem 1rem .85rem 1rem;
      color: #fff; position: relative; overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.14);
      transition: transform .15s;
      user-select: none;
    }
    .stat-card:active { transform: scale(.96); }
    .stat-card::before {
      content: ''; position: absolute; top: -18px; right: -18px;
      width: 65px; height: 65px; border-radius: 50%;
      background: rgba(255,255,255,.13);
    }
    .sc-blue   { background: linear-gradient(135deg,#5B8AF6,#3B6EF0); }
    .sc-red    { background: linear-gradient(135deg,#F96060,#E04040); }
    .sc-purple { background: linear-gradient(135deg,#9B6BF9,#7B4BE0); }
    .sc-orange { background: linear-gradient(135deg,#FFB43A,#F69520); }
    .sc-label {
      font-size: .62rem; font-weight: 700; opacity: .85;
      text-transform: uppercase; letter-spacing: .15em;
      margin-bottom: .4rem; display: flex; align-items: center; gap: .3rem;
    }
    .sc-label svg { width: 12px; height: 12px; }
    .sc-icon {
      position: absolute; top: .75rem; right: .75rem;
      width: 26px; height: 26px; border-radius: 8px;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
    }
    .sc-icon svg { width: 14px; height: 14px; }
    .sc-num { font-size: 1.9rem; font-weight: 900; line-height: 1; font-family: 'Poppins', sans-serif; }
    .sc-sub { font-size: .68rem; opacity: .82; margin-top: .15rem; font-weight: 600; }

    /* ── Leaderboard list ───────────────────────────────────── */
    .lb-list { padding: .4rem 0; }
    .lb-item {
      display: flex; align-items: center; gap: .8rem;
      padding: .8rem 1.1rem;
      border-bottom: 1px solid rgba(0,0,0,.04);
      transition: background .12s;
      position: relative;
    }
    .lb-item:active { background: rgba(62,207,142,.06); }
    .lb-item.me {
      background: linear-gradient(90deg, rgba(62,207,142,.1), rgba(62,207,142,.04));
      border-left: 3px solid var(--green);
    }
    .lb-rank-num {
      font-family: 'Poppins',sans-serif; font-weight: 900; font-size: .95rem;
      min-width: 24px; text-align: center; color: var(--tg-hint);
    }
    .lb-rank-num.r1 { color: var(--gold); }
    .lb-rank-num.r2 { color: #94A3B8; }
    .lb-rank-num.r3 { color: var(--orange); }
    .lb-rank-num.me-num {
      background: var(--green); color: #fff;
      border-radius: 8px; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; min-width: unset;
    }
    .lb-avatar { position: relative; flex-shrink: 0; }
    .lb-avatar svg.badge-svg { width: 40px; height: 40px; }
    .lb-avatar-crown { position: absolute; top: -7px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; }

    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-weight: 800; font-size: .9rem; display: flex; align-items: center; gap: .3rem; }
    .lb-name.me-name { color: var(--green2); }
    .lb-name-crown { width: 14px; height: 14px; }
    .lb-score { font-size: .72rem; font-weight: 700; color: var(--tg-hint); margin-top: .1rem; display: flex; align-items: center; gap: .3rem; }
    .lb-score-xp { color: var(--green2); font-weight: 800; }
    .lb-score svg { width: 12px; height: 12px; flex-shrink: 0; }

    .lb-action {
      flex-shrink: 0;
    }
    .follow-btn {
      background: var(--green); color: #fff; border: none; border-radius: 99px;
      padding: .4rem .9rem; font-weight: 800; font-size: .72rem;
      box-shadow: 0 4px 14px rgba(62,207,142,.3);
      transition: all .15s; font-family: 'Nunito',sans-serif;
    }
    .follow-btn:active { transform: scale(.95); background: var(--green2); }
    .trophy-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(62,207,142,.12); border: 1.5px solid rgba(62,207,142,.3);
      display: flex; align-items: center; justify-content: center;
    }
    .trophy-btn svg { width: 18px; height: 18px; }

    /* ── Badges page ────────────────────────────────────────── */
    .badges-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .85rem; padding: 1rem; }
    .badge-card {
      background: var(--white); border-radius: 1rem; padding: .9rem .6rem .75rem;
      box-shadow: var(--shadow-sm); text-align: center; position: relative;
      transition: transform .15s;
    }
    .badge-card:active { transform: scale(.94); }
    .badge-card.locked { opacity: .45; filter: grayscale(.8); }
    .badge-img { width: 52px; height: 52px; margin: 0 auto .5rem; object-fit: contain; }
    .badge-name { font-size: .68rem; font-weight: 800; line-height: 1.2; }
    .badge-earned { position: absolute; top: 6px; right: 6px; width: 16px; height: 16px; }
    .badge-earned svg { width: 16px; height: 16px; }

    /* ── Activity page ──────────────────────────────────────── */
    .activity-list { padding: .5rem 1rem; }
    .activity-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 0; border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .act-icon { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .act-icon svg { width: 20px; height: 20px; }
    .act-icon.completed { background: rgba(34,197,94,.12); }
    .act-icon.missed    { background: rgba(239,68,68,.1); }
    .act-icon.pending   { background: rgba(245,158,11,.1); }
    .act-icon.skipped   { background: rgba(100,116,139,.08); }
    .act-info { flex: 1; }
    .act-title  { font-weight: 700; font-size: .88rem; }
    .act-time   { font-size: .7rem; color: var(--tg-hint); margin-top: .1rem; font-weight: 600; }
    .act-status { font-size: .65rem; font-weight: 800; border-radius: 99px; padding: .2rem .55rem; }
    .s-completed { background: rgba(34,197,94,.15); color: #16a34a; }
    .s-missed    { background: rgba(239,68,68,.12); color: #dc2626; }
    .s-pending   { background: rgba(245,158,11,.12); color: #d97706; }
    .s-skipped   { background: rgba(100,116,139,.1); color: #64748b; }

    /* ── Empty / Loading ────────────────────────────────────── */
    .center-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; gap: .85rem; }
    .center-msg svg { width: 48px; height: 48px; opacity: .3; }
    .center-msg p { font-size: .85rem; color: var(--tg-hint); font-weight: 600; text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(62,207,142,.2); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Animations ─────────────────────────────────────────── */
    @keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: slide-up .4s both; }
    .lb-item { animation: slide-up .35s both; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PAGE 0: ANA SAYFA                                      -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div class="page active" id="page-home">
    <div class="page-content">

      <div class="header-strip">
        <div style="position:relative;z-index:1">
          <div class="header-label">YAP! PROFİL</div>
          <div class="header-name" id="h-greeting">Yükleniyor...</div>
        </div>
      </div>

      <div class="profile-card animate-in">
        <div class="profile-top">
          <div class="rank-badge-wrap">
            <div id="pf-badge"></div>
            <div class="rank-badge-crown" id="pf-crown" style="display:none">
              <svg viewBox="0 0 24 24" fill="#F9B43A"><path d="M2 19h20v2H2v-2zm2-1l3-11 5 7 5-9 3 13H4z"/></svg>
            </div>
          </div>
          <div class="pf-info">
            <div class="pf-name" id="pf-name">—</div>
            <div class="pf-rank" id="pf-title">—</div>
            <div class="pf-stars" id="pf-stars"></div>
          </div>
          <div class="pf-xp-pill">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span id="pf-xp-num">—</span>
          </div>
        </div>

        <div class="pf-pills">
          <div class="pill pill-fire">
            <svg viewBox="0 0 24 24"><path d="M17.66 11.2c-.23-.3-.51-.56-.77-.82-.67-.6-1.43-1.03-2.07-1.66C13.33 7.26 13 4.85 13.95 3c-.95.23-1.78.75-2.49 1.32-2.59 2.08-3.61 5.75-2.39 8.9.04.1.08.2.08.33 0 .22-.15.42-.35.5-.22.1-.46.04-.64-.12a1.44 1.44 0 01-.14-.17C6.97 12.1 6.7 9.71 7.47 7.75 5.55 9.44 4.5 11.96 4.5 14.5c0 4.15 3.35 7.5 7.5 7.5s7.5-3.35 7.5-7.5c0-1.35-.37-2.71-1.12-3.85L17.66 11.2z"/></svg>
            <span id="pf-streak">0 Gün Seri</span>
          </div>
          <div class="pill pill-rank">
            <svg viewBox="0 0 24 24"><path d="M3 13h2v8H3v-8zm4-4h2v12H7V9zm4-6h2v18h-2V3zm4 8h2v10h-2v-10zm4-4h2v14h-2V7z"/></svg>
            <span id="pf-pos">#1</span>
          </div>
          <div class="xp-bar-wrap">
            <div class="xp-bar-label">
              <span>Seviye XP</span>
              <span id="pf-pct" style="color:var(--green)">0%</span>
            </div>
            <div class="xp-track">
              <div class="xp-fill" id="pf-bar" style="width:0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-title">İstatistikler</div>
      <div class="stats-grid">
        <div class="stat-card sc-blue animate-in" style="animation-delay:.05s" id="sc-xp-card">
          <div class="sc-label">
            <svg viewBox="0 0 24 24" fill="rgba(255,255,255,.8)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Toplam XP
          </div>
          <div class="sc-icon">
            <svg viewBox="0 0 24 24" fill="white"><path d="M13 2L4.09 12.26c-.38.42-.09 1.07.47 1.07H11l-1 8.73c-.07.55.57.87.96.5L20 12.74c.36-.4.08-1.04-.46-1.04H13L13 2z"/></svg>
          </div>
          <div class="sc-num" id="sc-xp">—</div>
          <div class="sc-sub">deneyim puanı</div>
        </div>

        <div class="stat-card sc-red animate-in" style="animation-delay:.1s">
          <div class="sc-label">
            <svg viewBox="0 0 24 24" fill="rgba(255,255,255,.8)"><circle cx="12" cy="12" r="10" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2"/><path d="M9 12l2 2 4-4" stroke="rgba(255,255,255,.8)" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
            Rozet
          </div>
          <div class="sc-icon">
            <svg viewBox="0 0 24 24" fill="white"><path d="M12 15c-4.42 0-8-1.79-8-4V5l8-3 8 3v6c0 2.21-3.58 4-8 4zm0 2c4.42 0 8-1.79 8-4v2c0 2.21-3.58 4-8 4s-8-1.79-8-4v-2c0 2.21 3.58 4 8 4zm0 4c4.42 0 8-1.79 8-4v2c0 2.21-3.58 4-8 4s-8-1.79-8-4v-2c0 2.21 3.58 4 8 4z"/></svg>
          </div>
          <div class="sc-num" id="sc-badges">—</div>
          <div class="sc-sub">kazanılan</div>
        </div>

        <div class="stat-card sc-purple animate-in" style="animation-delay:.15s">
          <div class="sc-label">
            <svg viewBox="0 0 24 24" fill="rgba(255,255,255,.8)"><path d="M3 13h2v8H3v-8zm4-4h2v12H7V9zm4-6h2v18h-2V3zm4 8h2v10h-2v-10zm4-4h2v14h-2V7z"/></svg>
            Sıralama
          </div>
          <div class="sc-icon">
            <svg viewBox="0 0 24 24" fill="white"><path d="M2 20h20v2H2v-2zM4 18l4-11 4 7 4-10 4 14H4z"/></svg>
          </div>
          <div class="sc-num" id="sc-rank">—</div>
          <div class="sc-sub">lider tablosunda</div>
        </div>

        <div class="stat-card sc-orange animate-in" style="animation-delay:.2s">
          <div class="sc-label">

<script>
// ════════════════════════════════════════════════════════════
// TELEGRAM MINI APP INIT
// ════════════════════════════════════════════════════════════
const tg = window.Telegram.WebApp;

// 1. Ready + Expand
tg.ready();
tg.expand();

// 2. Set app colors matching our green theme
if (tg.setHeaderColor)    tg.setHeaderColor('#3ECF8E');
if (tg.setBackgroundColor) tg.setBackgroundColor('#F0F4FF');

// 3. Enable closing confirmation
if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();

// 4. Get Telegram user
const TG_USER = tg.initDataUnsafe?.user || null;

// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const SB_URL = 'https://txkhnectxqpjhfipdydq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4a2huZWN0eHFwamhmaXBkeWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NTUyOTUsImV4cCI6MjA5MTUzMTI5NX0.d_4W8md2BzpB9ysnpmWUZyT2vkoWXuPft0xeP1Lrl8I';

const sb = (path) => fetch(`${SB_URL}${path}`, {
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' }
});

const sbRpc = (fn, body) => fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
  method: 'POST',
  headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
  body: JSON.stringify(body)
});

// ════════════════════════════════════════════════════════════
// HAPTIC HELPERS
// ════════════════════════════════════════════════════════════
const haptic = {
  tap:     () => tg.HapticFeedback?.impactOccurred('light'),
  medium:  () => tg.HapticFeedback?.impactOccurred('medium'),
  heavy:   () => tg.HapticFeedback?.impactOccurred('heavy'),
  success: () => tg.HapticFeedback?.notificationOccurred('success'),
  error:   () => tg.HapticFeedback?.notificationOccurred('error'),
  warn:    () => tg.HapticFeedback?.notificationOccurred('warning'),
  select:  () => tg.HapticFeedback?.selectionChanged(),
};

// ════════════════════════════════════════════════════════════
// LEVELS
// ════════════════════════════════════════════════════════════
const LEVELS = [
  {l:1,xp:0,t:'Yeni Başlayan'},{l:2,xp:100,t:'Toparlanan'},{l:3,xp:250,t:'Takipte'},
  {l:4,xp:450,t:'Çabalayan'},{l:5,xp:700,t:'Düzenli'},{l:6,xp:1000,t:'Sağlamcı'},
  {l:7,xp:1350,t:'İnatçı'},{l:8,xp:1750,t:'Odakçı'},{l:9,xp:2200,t:'Disiplinci'},
  {l:10,xp:2700,t:'YAP! Çırağı'},{l:11,xp:3300,t:'Seri Kuran'},{l:12,xp:4000,t:'İradeci'},
  {l:13,xp:4800,t:'Güçlü Rutinci'},{l:14,xp:5700,t:'Düzen Ustası'},{l:15,xp:6700,t:'YAP! Ustası'},
  {l:16,xp:7800,t:'İcra Makinesi'},{l:17,xp:9000,t:'Çelik Rutin'},{l:18,xp:10300,t:'Sistem Adamı'},
  {l:19,xp:11700,t:'Bitirici'},{l:20,xp:13200,t:'YAP! Komutanı'},
];

function getLvl(xp)  { let c=LEVELS[0]; for(const l of LEVELS){if(xp>=l.xp)c=l;else break;} return c; }
function getNext(xp) { return LEVELS.find(l=>l.xp>xp)||null; }
function lvlPct(xp)  { const c=getLvl(xp),n=getNext(xp); if(!n)return 100; return Math.round(((xp-c.xp)/(n.xp-c.xp))*100); }
function starCount(level) { return Math.min(5, Math.ceil(level/4)); }
function fmt(n) { return Number(n||0).toLocaleString('tr'); }

// ════════════════════════════════════════════════════════════
// RANK BADGE SVG (dynamic, level-based color)
// ════════════════════════════════════════════════════════════
function badgeColor(level) {
  if (level >= 16) return { fill1:'#6366f1', fill2:'#4338ca', ring:'#818cf8' }; // platinum
  if (level >= 11) return { fill1:'#F9B43A', fill2:'#E09010', ring:'#FCD34D' }; // gold
  if (level >= 6)  return { fill1:'#94A3B8', fill2:'#64748B', ring:'#CBD5E1' }; // silver
  return { fill1:'#CD7C2F', fill2:'#9A5A1E', ring:'#F0A060' };                  // bronze
}

function rankBadgeSVG(level, size=56) {
  const c = badgeColor(level);
  const id = `bg${Math.random().toString(36).slice(2,6)}`;
  return `<svg class="badge-svg" width="${size}" height="${size}" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="s${id}" x1="10" y1="5" x2="90" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="${c.fill1}"/>
      <stop offset="1" stop-color="${c.fill2}"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M50 4 L92 20 L92 58 C92 80 72 96 50 104 C28 96 8 80 8 58 L8 20 Z"
    fill="url(#s${id})" stroke="${c.ring}" stroke-width="3.5"/>
  <!-- Inner highlight -->
  <path d="M50 12 L84 25 L84 57 C84 75 67 89 50 97"
    stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
  <!-- Chevron marks -->
  <path d="M33 38 L50 55 L67 38" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M33 52 L50 69 L67 52" stroke="rgba(255,255,255,0.45)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>`;
}

function crownSVG(size=18) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="#F9B43A">
    <path d="M2 19h20v2H2v-2zm1-1l3-11 6 7 6-9 3 13H3z"/>
  </svg>`;
}

function starSVG(filled) {
  return filled
    ? `<svg viewBox="0 0 24 24" width="13" height="13" fill="#F9B43A"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
    : `<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#CBD5E1" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
}

function starsHTML(level) {
  const n = starCount(level);
  let h = '';
  for(let i=0;i<5;i++) h += starSVG(i<n);
  return h;
}

// ════════════════════════════════════════════════════════════
// ANIMATE NUMBER
// ════════════════════════════════════════════════════════════
function animN(el, to, delay=0) {
  if (!el) return;
  const target = parseInt(to)||0;
  let n = 0;
  setTimeout(() => {
    if (target===0){el.textContent='0';return;}
    const step = Math.max(1, Math.round(target/50));
    const t = setInterval(() => {
      n = Math.min(n+step, target);
      el.textContent = fmt(n);
      if (n>=target) clearInterval(t);
    }, 16);
  }, delay);
}

// ════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════
let STATE = { me: null, lb: [], loaded: false };

async function loadMe() {
  try {
    if (TG_USER?.id) {
      const r = await sbRpc('get_user_stats', { p_telegram_id: TG_USER.id });
      const d = await r.json();
      if (d && d[0]) return d[0];
    }
    // Fallback: use first leaderboard user (preview mode)
    const r2 = await sb('/rest/v1/leaderboard?select=*&order=rank.asc&limit=1');
    const d2 = await r2.json();
    return d2?.[0] || null;
  } catch(e) { return null; }
}

async function loadLB() {
  try {
    const r = await sb('/rest/v1/leaderboard?select=*&order=rank.asc&limit=50');
    return await r.json();
  } catch(e) { return []; }
}

async function loadActivity() {
  try {
    if (TG_USER?.id) {
      const r = await sbRpc('get_user_activity', { p_telegram_id: TG_USER.id });
      return await r.json();
    }
    return [];
  } catch(e) { return []; }
}

async function refreshData() {
  haptic.medium();
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.style.transform = 'rotate(360deg)';
  setTimeout(() => { if(btn) btn.style.transform = ''; }, 600);
  
  const [me, lb] = await Promise.all([loadMe(), loadLB()]);
  STATE.me = me; STATE.lb = lb; STATE.loaded = true;
  
  renderHome(me);
  renderLB(lb, me);
  haptic.success();
}

// ════════════════════════════════════════════════════════════
// RENDER: HOME
// ════════════════════════════════════════════════════════════
function renderHome(me) {
  if (!me) {
    document.getElementById('h-greeting').textContent = `Merhaba, ${TG_USER?.first_name||'Ziyaretçi'}!`;
    return;
  }
  const lvl = getLvl(me.total_xp||0);
  const pct = lvlPct(me.total_xp||0);
  const isTop1 = me.rank == 1;

  document.getElementById('h-greeting').textContent = `Merhaba, ${me.first_name||'Kullanıcı'}!`;
  document.getElementById('pf-name').textContent    = me.first_name||'Anonim';
  document.getElementById('pf-title').textContent   = lvl.t;
  document.getElementById('pf-stars').innerHTML     = starsHTML(me.level||1);
  document.getElementById('pf-streak').textContent  = `${me.current_streak||0} Gün Seri`;
  document.getElementById('pf-pos').textContent     = `#${me.rank}`;
  document.getElementById('pf-pct').textContent     = `${pct}%`;

  // Badge
  document.getElementById('pf-badge').innerHTML = rankBadgeSVG(me.level||1, 56);
  if (isTop1) {
    const crown = document.getElementById('pf-crown');
    if (crown) { crown.style.display=''; crown.innerHTML=crownSVG(18); }
  }

  // XP pill
  animN(document.getElementById('pf-xp-num'), me.total_xp, 100);

  // Stat cards
  animN(document.getElementById('sc-xp'),     me.total_xp, 200);
  animN(document.getElementById('sc-badges'), Math.max(1, Math.floor((me.level||1)/2)), 300);
  animN(document.getElementById('sc-rank'),   me.rank,    400);
  animN(document.getElementById('sc-tasks'),  me.completed_tasks, 500);

  // XP bar
  setTimeout(() => {
    document.getElementById('pf-bar').style.width = pct + '%';
  }, 600);

  // Compact header (leaderboard page)
  document.getElementById('hc-avatar').innerHTML = rankBadgeSVG(me.level||1, 40);
  document.getElementById('hc-name').textContent  = me.first_name||'Anonim';
  document.getElementById('hc-rank').textContent  = `${lvl.t} · #${me.rank}`;
  document.getElementById('hc-stars').innerHTML   = starsHTML(me.level||1);

  // Main button for home tab
  setupMainButton('home');
}

// ════════════════════════════════════════════════════════════
// RENDER: LEADERBOARD
// ════════════════════════════════════════════════════════════
function renderLB(lb, me) {
  if (!lb || !lb.length) {
    document.getElementById('lb-list').innerHTML = `
      <div class="center-msg">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M8 21h8M12 21v-4M4 4h4v7a4 4 0 008 0V4h4M4 4H2M20 4h2"/></svg>
        <p>Henüz sıralama yok</p>
      </div>`;
    return;
  }

  const myId = me?.user_id || me?.telegram_id;
  let html = '';

  lb.forEach((p, i) => {
    const isMe = me && (p.user_id === myId || p.telegram_id == TG_USER?.id || (i===0 && !TG_USER));
    const lvl = getLvl(p.total_xp||0);
    const top3 = p.rank <= 3;

    const rankEl = isMe
      ? `<div class="lb-rank-num me-num">${p.rank}</div>`
      : p.rank === 1 ? `<div class="lb-rank-num r1">1</div>`
      : p.rank === 2 ? `<div class="lb-rank-num r2">2</div>`
      : p.rank === 3 ? `<div class="lb-rank-num r3">3</div>`
      : `<div class="lb-rank-num">${p.rank}</div>`;

    const crownHtml = p.rank===1
      ? `<div class="lb-avatar-crown">${crownSVG(14)}</div>` : '';

    const actionEl = isMe
      ? `<div class="lb-action"><div class="trophy-btn"><svg viewBox="0 0 24 24" fill="${badgeColor(me.level||1).fill1}"><path d="M8 21h8M12 21v-4M4 4h4v7a4 4 0 008 0V4h4M4 4H2M20 4h2"/></svg></div></div>`
      : `<div class="lb-action"><button class="follow-btn" onclick="onFollow('${p.first_name||'Kullanıcı'}')">Takip</button></div>`;

    html += `
    <div class="lb-item ${isMe?'me':''}" style="animation-delay:${i*.03}s" onclick="onRowTap(${p.rank},'${p.first_name||''}')">
      ${rankEl}
      <div class="lb-avatar">
        ${rankBadgeSVG(p.level||1, 40)}
        ${crownHtml}
      </div>
      <div class="lb-info">
        <div class="lb-name ${isMe?'me-name':''}">${p.first_name||'Anonim'}${p.rank<=3?` ${crownSVG(14)}`:''}
        </div>
        <div class="lb-score">
          <svg viewBox="0 0 24 24" fill="${'var(--green)'}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="lb-score-xp">${fmt(p.total_xp)}</span>
          &nbsp;·&nbsp;
          <svg viewBox="0 0 24 24" fill="#f97316"><path d="M17.66 11.2c-.23-.3-.51-.56-.77-.82-.67-.6-1.43-1.03-2.07-1.66C13.33 7.26 13 4.85 13.95 3c-.95.23-1.78.75-2.49 1.32-2.59 2.08-3.61 5.75-2.39 8.9.04.1.08.2.08.33 0 .22-.15.42-.35.5-.22.1-.46.04-.64-.12a1.44 1.44 0 01-.14-.17C6.97 12.1 6.7 9.71 7.47 7.75 5.55 9.44 4.5 11.96 4.5 14.5c0 4.15 3.35 7.5 7.5 7.5s7.5-3.35 7.5-7.5c0-1.35-.37-2.71-1.12-3.85L17.66 11.2z"/></svg>
          ${p.current_streak||0} gün
        </div>
      </div>
      ${actionEl}
    </div>`;
  });

  document.getElementById('lb-list').innerHTML = html;
}

  { id:'chicken',name:'Protein Kral',  img:'./assets/svg/chicken.svg',  cond: m=>m.completed_tasks>=100,  desc:'100 görev tamamla' },
  { id:'grape',  name:'Bereket',       img:'./assets/svg/grape.svg',    cond: m=>(m.longest_streak||0)>=14,desc:'14 günlük seri' },
  { id:'donut',  name:'Sindirici',     img:'./assets/svg/donut.svg',    cond: m=>m.level>=15,             desc:'Seviye 15\'e ulaş' },
];

function renderBadges(me) {
  let html = '';
  BADGE_DEFS.forEach((b, i) => {
    const earned = me ? b.cond(me) : false;
    html += `
    <div class="badge-card ${earned?'':'locked'} animate-in" style="animation-delay:${i*.04}s"
         onclick="onBadgeTap('${b.name}','${b.desc}',${earned})">
      <img class="badge-img" src="${b.img}" alt="${b.name}" loading="lazy"/>
      <div class="badge-name">${b.name}</div>
      ${earned ? `<div class="badge-earned"><svg viewBox="0 0 24 24" fill="#3ECF8E"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>` : ''}
    </div>`;
  });
  document.getElementById('badges-grid').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// RENDER: ACTIVITY
// ════════════════════════════════════════════════════════════
function renderActivity(acts) {
  if (!acts || !acts.length) {
    document.getElementById('act-list').innerHTML = `
      <div class="center-msg">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <p>Henüz aktivite yok.<br/>Görevleri tamamladıkça burada görünecek.</p>
      </div>`;
    return;
  }

  const STATUS_LABEL = { completed:'Tamamlandı', missed:'Kaçırıldı', pending:'Bekliyor', skipped:'Atlandı' };
  const STATUS_CLS   = { completed:'s-completed', missed:'s-missed', pending:'s-pending', skipped:'s-skipped' };
  const ICON_CLS     = { completed:'completed', missed:'missed', pending:'pending', skipped:'skipped' };
  const ICONS = {
    completed: `<path d="M9 12l2 2 4-4" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="12" cy="12" r="9" stroke="#22c55e" stroke-width="2" fill="none"/>`,
    missed:    `<circle cx="12" cy="12" r="9" stroke="#ef4444" stroke-width="2" fill="none"/><path d="M15 9l-6 6M9 9l6 6" stroke="#ef4444" stroke-width="2" stroke-linecap="round" fill="none"/>`,
    pending:   `<circle cx="12" cy="12" r="9" stroke="#f59e0b" stroke-width="2" fill="none"/><path d="M12 7v5l3 3" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none"/>`,
    skipped:   `<circle cx="12" cy="12" r="9" stroke="#94a3b8" stroke-width="2" fill="none"/><path d="M9 12h6M15 12l-3-3m3 3l-3 3" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" fill="none"/>`,
  };

  let html = '';
  acts.forEach((a, i) => {
    const st = a.status || 'pending';
    const dt = new Date(a.scheduled_time||a.scheduled_date);
    const dateStr = dt.toLocaleDateString('tr-TR', {day:'numeric',month:'short'});
    const timeStr = a.scheduled_time ? dt.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : '';
    html += `
    <div class="activity-item animate-in" style="animation-delay:${i*.03}s">
      <div class="act-icon ${ICON_CLS[st]||''}">
        <svg viewBox="0 0 24 24" width="20" height="20">${ICONS[st]||ICONS.pending}</svg>
      </div>
      <div class="act-info">
        <div class="act-title">${a.task_title||'Görev'}</div>
        <div class="act-time">${dateStr}${timeStr?' · '+timeStr:''}</div>
      </div>
      <span class="act-status ${STATUS_CLS[st]||''}">${STATUS_LABEL[st]||st}</span>
    </div>`;
  });
  document.getElementById('act-list').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// MAIN BUTTON
// ════════════════════════════════════════════════════════════
function setupMainButton(tab) {
  if (!tg.MainButton) return;
  if (tab === 'home') {
    tg.MainButton.setParams({ text:'📋 Bota Dön', color:'#3ECF8E', text_color:'#ffffff' });
    tg.MainButton.show();
    tg.MainButton.onClick(() => {
      haptic.medium();
      tg.close();
    });
  } else if (tab === 'lb') {
    tg.MainButton.setParams({ text:'📤 Sıralamayı Paylaş', color:'#3ECF8E', text_color:'#ffffff' });
    tg.MainButton.show();
    tg.MainButton.onClick(() => {
      haptic.tap();
      const me = STATE.me;
      if (me) {
        tg.switchInlineQuery
          ? tg.switchInlineQuery(`#${me.rank} sıradayım, ${fmt(me.total_xp)} XP kazandım! YAP! 🔥`)
          : tg.showAlert(`#${me.rank} sıradayım, ${fmt(me.total_xp)} XP kazandım! 🔥`);
      }
    });
  } else {
    tg.MainButton.hide();
  }
}

// ════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════
function onFollow(name) {
  haptic.tap();
  tg.showPopup({
    title: 'Takip Et',
    message: `${name} ya da YAP! botunu arkadaşlarına önermek ister misin?`,
    buttons: [
      { id:'share', type:'default', text:'Botu Paylaş' },
      { id:'cancel', type:'cancel' }
    ]
  }, (bid) => {
    if (bid === 'share') {
      haptic.success();
      tg.switchInlineQuery
        ? tg.switchInlineQuery('YAP! Habit Bot')
        : tg.showAlert('YAP! botunu @yaphabitbot adresinden bulabilirsin!');
    }
  });
}

function onRowTap(rank, name) {
  haptic.select();
  if (name) {
    tg.showPopup && tg.showPopup({
      title: `#${rank} — ${name}`,
      message: 'Bu oyuncu hakkında detay bilgi yakında gelecek!',
      buttons: [{ type:'close' }]
    });
  }
}

function onBadgeTap(name, desc, earned) {
  haptic.select();
  tg.showPopup({
    title: earned ? `✅ ${name}` : `🔒 ${name}`,
    message: earned ? `Bu rozeti kazandın! Harika iş çıkardın. 🎉` : `Koşul: ${desc}`,
    buttons: [{ type:'close' }]
  });
}

// ════════════════════════════════════════════════════════════
// TAB NAVIGATION
// ════════════════════════════════════════════════════════════
let currentTab = 'home';
const tabs = ['home','lb','badges','activity'];
const pages = { home:'page-home', lb:'page-lb', badges:'page-badges', activity:'page-activity' };

function switchTab(tab, btn) {
  if (tab === currentTab) return;
  haptic.select();

  // Pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pages[tab])?.classList.add('active');

  // Tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  btn?.classList.add('active');

  // BackButton
  if (tab === 'home') {
    tg.BackButton?.hide();
  } else {
    tg.BackButton?.show();
    tg.BackButton?.onClick(() => switchTab('home', document.querySelector('[data-tab="home"]')));
  }

  currentTab = tab;
  setupMainButton(tab);

  // Lazy load page content
  if (tab === 'badges' && STATE.me) renderBadges(STATE.me);
  if (tab === 'activity') {
    loadActivity().then(a => renderActivity(a));
  }
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
async function init() {
  // Stat cards loading state
  ['sc-xp','sc-badges','sc-rank','sc-tasks','pf-xp-num'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '—';
  });

  const [me, lb] = await Promise.all([loadMe(), loadLB()]);
  STATE.me = me; STATE.lb = lb; STATE.loaded = true;

  renderHome(me);
  renderLB(lb, me);
  if (me) renderBadges(me);

  haptic.success();
  setupMainButton('home');
}

// Auto-refresh every 90s
setInterval(() => {
  Promise.all([loadMe(), loadLB()]).then(([me,lb]) => {
    STATE.me=me; STATE.lb=lb;
    renderHome(me); renderLB(lb,me); if(me)renderBadges(me);
  });
}, 90000);

init();
</script>
