<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="color-scheme" content="light dark"/>
  <title>YAP! Rank</title>

  <!-- Telegram Mini App SDK — MUST be first script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@500;700;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="app">

  <!-- ═══ ONBOARDING OVERLAY ═══ -->
  <div id="onboarding" class="onboarding-overlay" style="display:none"></div>

  <!-- ═══ PAGE: BUGÜN ═══ -->
  <div class="page active" id="page-today">
    <div class="page-content" id="today-content">
      <div class="center-msg"><div class="spinner"></div><p>Yükleniyor...</p></div>
    </div>
  </div>

  <!-- ═══ PAGE: PROFİL ═══ -->
  <div class="page" id="page-profile">
    <div class="page-content" id="profile-content">
      <div class="center-msg"><div class="spinner"></div><p>Yükleniyor...</p></div>
    </div>
  </div>

  <!-- ═══ PAGE: SIRALAMA ═══ -->
  <div class="page" id="page-lb">
    <div class="page-content" id="lb-content">
      <div class="center-msg"><div class="spinner"></div><p>Yükleniyor...</p></div>
    </div>
  </div>

  <!-- ═══ PAGE: ÖDÜLLER ═══ -->
  <div class="page" id="page-badges">
    <div class="page-content" id="badges-content">
      <div class="center-msg"><div class="spinner"></div><p>Yükleniyor...</p></div>
    </div>
  </div>

  <!-- ═══ PAGE: AYARLAR ═══ -->
  <div class="page" id="page-settings">
    <div class="page-content" id="settings-content">
      <div class="center-msg"><div class="spinner"></div><p>Yükleniyor...</p></div>
    </div>
  </div>

  <!-- ═══ ONBOARDING OVERLAY ═══ -->
  <div id="onboarding" class="onboarding-overlay" style="display:none"></div>

  <!-- ═══ MODALS ═══ -->
  <div id="modal-add-task" class="modal-overlay" style="display:none"></div>
  <div id="modal-task-detail" class="modal-overlay" style="display:none"></div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast-container"></div>

  <!-- ═══ CONFETTI ═══ -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ═══ BOTTOM NAVIGATION ═══ -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-tab active" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      Bugün
    </button>
    <button class="nav-tab" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profil
    </button>
    <button class="nav-tab" data-tab="lb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 21h8M12 21v-4M4 4h4v7a4 4 0 008 0V4h4M4 4H2M20 4h2"/>
      </svg>
      Sıralama
    </button>
    <button class="nav-tab" data-tab="badges">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 15c-4.42 0-8-1.79-8-4V5l8-3 8 3v6c0 2.21-3.58 4-8 4z"/>
        <path d="M4 15c0 2.21 3.58 4 8 4s8-1.79 8-4"/>
        <path d="M4 19c0 2.21 3.58 4 8 4s8-1.79 8-4"/>
      </svg>
      Ödüller
    </button>
    <button class="nav-tab" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Ayarlar
    </button>
  </nav>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
