[build]
  command = "npm run build"
  publish = "dist"

# SPA — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Allow iframe embedding (required for Telegram Mini App)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
